name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test-lint-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest -q

      - name: Lint with ruff
        run: ruff check .

      - name: Security scan with bandit
        run: bandit -q -r src
