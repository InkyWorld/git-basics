name: CI-CD Lab 3

on:
  push:
    branches:
      - ci-lab3
      - main
  pull_request:
    branches:
      - ci-lab3
  workflow_dispatch:
    inputs:
      force_verify_fail:
        description: "Force verify_staging to fail"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

env:
  BUILD_ARTIFACT_NAME: build-artifact
  STAGING_ARTIFACT_NAME: staging-report
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_core.py" -v

  build:
    name: build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create build artifact
        run: python scripts/build_artifact.py --output artifact/build.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT_NAME }}
          path: artifact/build.txt

  deploy_staging:
    name: deploy_staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT_NAME }}
          path: artifact

      - name: Simulate deploy to staging
        run: python scripts/deploy_staging.py --artifact artifact/build.txt --output staging/staging-deploy.txt

      - name: Upload staging report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STAGING_ARTIFACT_NAME }}
          path: staging/staging-deploy.txt

  verify_staging:
    name: verify_staging
    runs-on: ubuntu-latest
    needs: deploy_staging
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download staging report
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.STAGING_ARTIFACT_NAME }}
          path: staging

      - name: Run smoke verification
        run: |
          if [ "${{ github.event.inputs.force_verify_fail || 'false' }}" = "true" ]; then
            python scripts/verify_staging.py --staging-report staging/staging-deploy.txt --fail
          else
            python scripts/verify_staging.py --staging-report staging/staging-deploy.txt
          fi

  deploy_production:
    name: deploy_production
    runs-on: ubuntu-latest
    needs: verify_staging
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT_NAME }}
          path: artifact

      - name: Simulate deploy to production
        run: python scripts/deploy_production.py --artifact artifact/build.txt --output production/production-deploy.txt
